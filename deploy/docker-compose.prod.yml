version: '3.8'

services:
  postgres:
    image: postgres:16
    restart: always
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: agentstack
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-agentstack_prod}"
      POSTGRES_DB: agentstack
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentstack"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: always
    ports: ["9000:9000", "8123:8123"]
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports: ["6379:6379"]
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-agentstack_prod}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-agentstack_prod}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:latest
    restart: always
    ports: ["4222:4222", "8222:8222"]
    command: ["--jetstream", "--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["/migrate", "-direction", "up", "-seed"]
    environment:
      DATABASE_URL: "postgresql://agentstack:${POSTGRES_PASSWORD:-agentstack_prod}@postgres:5432/agentstack?sslmode=disable"
      CLICKHOUSE_URL: "clickhouse://clickhouse:9000/agentstack"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    ports: ["8080:8080"]
    command: ["/server"]
    environment:
      PORT: "8080"
      ENVIRONMENT: "production"
      DATABASE_URL: "postgresql://agentstack:${POSTGRES_PASSWORD:-agentstack_prod}@postgres:5432/agentstack?sslmode=disable"
      CLICKHOUSE_URL: "clickhouse://clickhouse:9000/agentstack"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-agentstack_prod}@redis:6379"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    command: ["/worker"]
    environment:
      ENVIRONMENT: "production"
      DATABASE_URL: "postgresql://agentstack:${POSTGRES_PASSWORD:-agentstack_prod}@postgres:5432/agentstack?sslmode=disable"
      CLICKHOUSE_URL: "clickhouse://clickhouse:9000/agentstack"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-agentstack_prod}@redis:6379"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    restart: always
    ports: ["8090:8090"]
    environment:
      GATEWAY_PORT: "8090"
      ENVIRONMENT: "production"
      DATABASE_URL: "postgresql://agentstack:${POSTGRES_PASSWORD:-agentstack_prod}@postgres:5432/agentstack?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-agentstack_prod}@redis:6379"
      NATS_URL: "nats://nats:4222"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: always
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: "http://server:8080"
    depends_on:
      - server

volumes:
  pgdata:
  chdata:
